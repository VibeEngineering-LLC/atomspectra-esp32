<!DOCTYPE html>
<html><head><meta charset="utf-8">
<title>AtomSpectra Gateway</title>
<style>
body{font-family:monospace;background:#111;color:#0f0;margin:20px}
canvas{border:1px solid #0f0;display:block;margin:10px 0}
button{background:#222;color:#0f0;border:1px solid #0f0;padding:8px 16px;cursor:pointer;margin:4px}
button:hover{background:#0f0;color:#111}
button.del{border-color:#f44;color:#f44}
button.del:hover{background:#f44;color:#111}
.info{color:#0a0;font-size:14px;margin:8px 0}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#log{color:#080;font-size:12px;max-height:120px;overflow-y:auto;white-space:pre;margin-top:8px}
h2{color:#0c0;margin:20px 0 8px;border-top:1px solid #040;padding-top:12px}
table{border-collapse:collapse;margin:8px 0}
th,td{border:1px solid #040;padding:6px 12px;text-align:left}
th{color:#0c0}
a{color:#0f0}
.empty{color:#060;font-style:italic}
</style></head>
<body>
<h1>AtomSpectra Gateway</h1>
<div class="info" id="status">Connecting...</div>
<canvas id="sp" width="1200" height="400"></canvas>
<div class="row">
<button onclick="resetSpectrum()">Reset</button>
<button onclick="saveSpectrum()">Save</button>
<button onclick="location.href='/api/export.xml'">Export XML</button>
<button onclick="location.href='/api/export.csv'">Export CSV</button>
<button onclick="requestInfo()">Info</button>
<button onclick="toggleLog()">Log</button>
<button onclick="resetWifi()" style="border-color:#f80;color:#f80">WiFi Reset</button>
<input id="cmd" placeholder="-inf" style="background:#222;color:#0f0;border:1px solid #0f0;padding:8px;width:200px">
<button onclick="sendCmd()">Send</button>
</div>
<pre id="log" style="display:none"></pre>

<h2>Saved Spectra</h2>
<div id="saved"><span class="empty">Loading...</span></div>

<script>
var C = document.getElementById("sp");
var X = C.getContext("2d");
var logEl = document.getElementById("log");

function log(msg) {
    logEl.textContent += msg + "\n";
    logEl.scrollTop = logEl.scrollHeight;
}

function fmtTime(s) {
    var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
    return (h > 0 ? h + "h " : "") + (m > 0 ? m + "m " : "") + ss + "s";
}

async function update() {
    try {
        var r = await fetch("/api/spectrum.json");
        if (!r.ok) { document.getElementById("status").textContent = "No data"; return; }
        var d = await r.json();
        document.getElementById("status").textContent =
            "Counts: " + d.total + " | CPU: " + d.cpu + "% | T1: " + d.t1 + "C | T2: " + d.t2 + "C | T3: " + d.t3 + "C";
        var mx = 0;
        for (var i = 0; i < d.bins.length; i++) if (d.bins[i] > mx) mx = d.bins[i];
        if (mx < 1) mx = 1;
        X.fillStyle = "#111"; X.fillRect(0, 0, 1200, 400);
        X.fillStyle = "#0f0";
        var bw = 1200.0 / d.bins.length;
        for (var i = 0; i < d.bins.length; i++) {
            var h = d.bins[i] / mx * 380;
            X.fillRect(i * bw, 400 - h, Math.max(bw - 0.3, 0.3), h);
        }
    } catch(e) { document.getElementById("status").textContent = "Error: " + e; }
}

async function loadSaved() {
    var el = document.getElementById("saved");
    try {
        var r = await (await fetch("/api/list")).json();
        if (!r.spectra || r.spectra.length === 0) {
            el.innerHTML = '<span class="empty">No saved spectra</span>';
            return;
        }
        var html = '<table><tr><th>#</th><th>Saved</th><th>Counts</th><th>Duration</th><th>Export</th><th></th></tr>';
        for (var i = 0; i < r.spectra.length; i++) {
            var s = r.spectra[i];
            var dt = s.saved_at > 0 ? new Date(s.saved_at * 1000).toLocaleString() : '—';
            html += '<tr><td>' + s.index + '</td><td>' + dt + '</td><td>' + s.counts.toLocaleString() + '</td><td>' + fmtTime(s.time) + '</td>' +
                '<td><a href="/api/saved/' + s.index + '/export.xml">XML</a> | ' +
                '<a href="/api/saved/' + s.index + '/export.csv">CSV</a></td>' +
                '<td><button class="del" onclick="delSaved(' + s.index + ')">Del</button></td></tr>';
        }
        html += '</table>';
        el.innerHTML = html;
    } catch(e) { el.innerHTML = '<span class="empty">Error: ' + e + '</span>'; }
}

async function delSaved(idx) {
    if (!confirm("Delete saved spectrum #" + idx + "?")) return;
    await fetch("/api/saved/" + idx + "/delete", {method:"POST"});
    log("Deleted #" + idx);
    loadSaved();
}

async function resetSpectrum() { await fetch("/api/reset", {method:"POST"}); log("Reset sent"); update(); }
async function saveSpectrum() {
    var r = await (await fetch("/api/save", {method:"POST"})).json();
    log(r.ok ? "Saved #" + r.index : "Save error");
    if (r.ok) loadSaved();
}
async function requestInfo() { await fetch("/api/command", {method:"POST", body:"-inf"}); log("Info requested"); setTimeout(update, 500); }
async function sendCmd() {
    var c = document.getElementById("cmd").value;
    if (!c) return;
    await fetch("/api/command", {method:"POST", body:c});
    log("Sent: " + c);
    setTimeout(update, 500);
}
function toggleLog() { logEl.style.display = logEl.style.display === "none" ? "block" : "none"; }
async function resetWifi() {
    if (!confirm("Clear WiFi config and reboot into setup mode?")) return;
    await fetch("/api/wifi/reset", {method:"POST"});
    document.getElementById("status").textContent = "Rebooting into WiFi setup...";
}

document.getElementById("cmd").addEventListener("keydown", function(e) { if (e.key === "Enter") sendCmd(); });
setInterval(update, 1000);
update();
loadSaved();
</script>
</body></html>
